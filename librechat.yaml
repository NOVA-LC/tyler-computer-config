version: 1.2.8
cache: true

# Hot-reloaded by Railway via CONFIG_PATH env var pointing to:
# https://raw.githubusercontent.com/NOVA-LC/tyler-computer-config/main/librechat.yaml
# Push to main → restart api → changes live.

interface:
  customWelcome: "Welcome to Tyler-Computer. Family AI. Pick Claude (default) or a different model."
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true

registration:
  socialLogins: []

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      - "claude-opus-4-7"
      - "claude-sonnet-4-6"
      - "claude-haiku-4-5-20251001"
    titleModel: "claude-haiku-4-5-20251001"
    titleConvo: true
    modelDisplayLabel: "Claude"

  openAI:
    apiKey: "${OPENAI_API_KEY}"
    models:
      - "gpt-5.5"
      - "gpt-5"
      - "gpt-4.1"
      - "gpt-4.1-mini"
      - "o4-mini"
    titleModel: "gpt-4.1-mini"
    titleConvo: true
    modelDisplayLabel: "OpenAI"

  google:
    apiKey: "${GOOGLE_KEY}"
    models:
      - "gemini-2.5-pro"
      - "gemini-2.5-flash"
      - "gemini-2.0-flash"
    titleModel: "gemini-2.5-flash"
    titleConvo: true
    modelDisplayLabel: "Gemini"

# Model presets — Claude Sonnet is the default because prioritize: true picks
# the first one with default: true on new conversations. Research preset uses
# the same model but with a system prompt that forces web-search-then-cite
# (Perplexity-style). User must enable the "searxng" MCP from the chat
# dropdown for the model to actually call out to SearXNG; the prompt tells
# it to do that.
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "claude-sonnet"
      label: "Claude Sonnet 4.6 (default)"
      default: true
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-6"
        modelLabel: "Claude Sonnet"

    - name: "research"
      label: "🔎 Research (human-verified + cite)"
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-6"
        modelLabel: "Research"
        promptPrefix: |
          You are a research assistant for the Brown family. For ANY factual
          claim, current event, statistic, or "what's happening with X" type
          question, you MUST call the `searxng` MCP tool to search the web
          BEFORE answering. Never answer from your own knowledge alone.

          If the user hasn't enabled the `searxng` MCP server in their chat,
          your first message must be exactly:
            "Please enable the **searxng** MCP from the dropdown below your
            text input, then re-send your question. (I need it for live
            web search.)"

          === SOURCE PRIORITY (HARD RULES) ===

          Tyler's rule: prioritize REAL HUMAN content. Skip AI-generated slop.

          TIER 1 (use these first, search for them explicitly):
            1. Reddit threads (search with `site:reddit.com` modifier when relevant)
            2. GitHub repos / issues / discussions / commits / READMEs
            3. Hacker News threads (`site:news.ycombinator.com`)
            4. Stack Overflow / Stack Exchange answers
            5. Personal blogs by named authors with bios + post histories
            6. Official documentation from the actual maintainers/companies
            7. Government / academic / .edu / .gov primary sources
            8. Wikipedia (only as a launchpad to its cited primary sources)

          TIER 2 (use only if Tier 1 has nothing):
            - Major newspapers with bylined human journalists (NYT, WaPo,
              Guardian, Reuters, AP) — name the journalist in your citation
            - YouTube videos by individual humans (not faceless channels)
            - Substack / Mastodon / personal X threads by domain experts

          NEVER USE (filter out, don't cite):
            - "Top 10" listicle sites (digitaltrends, hackernoon-spam,
              makeuseof, beginnersinai, toolhalla, etc. — anything that smells
              like an SEO content farm)
            - Sites with NO bylines or generic "Editorial Team" attribution
            - Articles with these AI-slop tells: em-dashes used as commas,
              "delve into", "tapestry of", "in today's fast-paced world",
              "let's explore", "in this article we will", "comprehensive guide",
              numbered-heading-then-paragraph structure without examples
            - LinkedIn "thought leadership" articles
            - openalternative.co, sourceforge software listings, generic
              "alternatives to X" aggregators

          === VERIFICATION STEP ===

          For each source you cite, briefly note WHY it's human-verified:
            - "Reddit comment by u/[username] with [N] upvotes"
            - "GitHub issue #[N] by maintainer @[username]"
            - "Blog post by [author name] (their bio: [one line])"
            - "NYT article by [journalist name]"

          If you can't find at least one Tier-1 source for the claim, say:
            "I could only find low-confidence sources for this — most results
            were AI-generated content farms. Take this with skepticism: [your
            best partial answer based on what little human content existed]."

          === OUTPUT FORMAT ===

          [Your answer text with claims numbered like [1] and [2].]

          ## Sources

          [1] Reddit r/[subreddit] — "[thread title]" by u/[username] ([N] upvotes, [date]) — [url]
          [2] GitHub [owner/repo] issue #[N] — "[issue title]" by @[maintainer] — [url]
          [3] [Author name]'s blog — "[post title]" ([date]) — [url]

          Rules:
          - Cite minimum 2 sources for any non-trivial claim. 3+ preferred.
          - At least 1 source per answer MUST be Tier-1 (Reddit/GitHub/HN/SO).
          - If sources disagree, quote each side and explain the disagreement.
          - Prefer 2024-2026 sources unless the question is about history.
          - If you can't find good human sources after 2 search attempts with
            different queries, stop and tell the user — don't fabricate.

    - name: "claude-opus"
      label: "Claude Opus 4.7 (heavy reasoning)"
      preset:
        endpoint: "anthropic"
        model: "claude-opus-4-7"
        modelLabel: "Claude Opus"

    - name: "claude-haiku"
      label: "Claude Haiku 4.5 (fast/cheap)"
      preset:
        endpoint: "anthropic"
        model: "claude-haiku-4-5-20251001"
        modelLabel: "Claude Haiku"

    - name: "gpt-5"
      label: "GPT-5"
      preset:
        endpoint: "openAI"
        model: "gpt-5"
        modelLabel: "GPT-5"

    - name: "gemini-pro"
      label: "Gemini 2.5 Pro"
      preset:
        endpoint: "google"
        model: "gemini-2.5-pro"
        modelLabel: "Gemini 2.5 Pro"

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  tts:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# MCP servers — same pattern as our local install.
# Railway notes:
#   - filesystem: rooted at /tmp/workspace inside the container (ephemeral until
#     we add a Railway volume; survives chat sessions but is lost on redeploy).
#   - railway: no env token — uses configure_api_token tool from chat on first
#     use (workaround for the GraphQL-during-init bug in @jasontanswe/railway-mcp).
#   - mcp-searxng: requires SearXNG service in the same Railway project. Will be
#     added in Phase 2; ${SEARXNG_URL} env var set on the LibreChat service to
#     the SearXNG service's private domain.
mcpServers:
  filesystem:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /tmp
    # /tmp is the ephemeral, always-present writable dir on Railway.
    # Files don't survive redeploys. For persistent storage, add a
    # Railway volume mount in Phase 5.
    timeout: 60000
    chatMenu: true

  github:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
    timeout: 60000
    chatMenu: true

  supabase:
    type: stdio
    command: npx
    args:
      - -y
      - "@supabase/mcp-server-supabase@latest"
      - "--read-only"
    env:
      SUPABASE_ACCESS_TOKEN: "${SUPABASE_ACCESS_TOKEN}"
    timeout: 60000
    chatMenu: true

  railway:
    type: stdio
    command: npx
    args:
      - -y
      - "@jasontanswe/railway-mcp"
    # NO env: RAILWAY_API_TOKEN here — skipping it makes the package
    # respond to MCP init in ~3s instead of timing out on Railway GraphQL
    # handshake. Set the token at runtime via `configure_api_token` tool
    # from chat. (Per LibreChat discussion #6629: initTimeout not honored.)
    timeout: 60000
    chatMenu: true

  searxng:
    type: stdio
    command: npx
    args:
      - -y
      - "mcp-searxng"
    env:
      # SearXNG reachable via Railway internal network (same project).
      # Set SEARXNG_URL env on the LibreChat service to:
      # http://searxng.railway.internal:8080
      SEARXNG_URL: "${SEARXNG_URL}"
    timeout: 60000
    chatMenu: true

  # Phase 3: Comet-style agentic browser via Microsoft's official Playwright MCP.
  # Drives a real headless Chromium.
  # Phase 3.5: --user-data-dir points at a Railway volume mounted at /data, so
  # the browser's cookies/localStorage/login sessions survive across chats and
  # redeploys. Log into LinkedIn once, the AI can use that session for weeks.
  # Note: NO --isolated flag — that flag forces a fresh profile per session,
  # which is what we DON'T want for the persistence story.
  playwright:
    type: stdio
    command: npx
    args:
      - -y
      - "@playwright/mcp"
      - "--headless"
      - "--browser=chromium"
      - "--user-data-dir=/data/chromium-profile"
    initTimeout: 300000
    timeout: 180000
    chatMenu: true
