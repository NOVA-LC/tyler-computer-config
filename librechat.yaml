version: 1.2.8
cache: true

# Hot-reloaded by Railway via CONFIG_PATH env var pointing to:
# https://raw.githubusercontent.com/NOVA-LC/tyler-computer-config/main/librechat.yaml
# Push to main → restart api → changes live.

interface:
  customWelcome: "Welcome to Tyler-Computer. Family AI. Pick Claude (default) or a different model."
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true

registration:
  socialLogins: []

# Phase 4.5: per-user wallet (Path B — Tyler is the bank).
# 1,000,000 tokenCredits = $1.00. Each new family member starts with $3 of
# credit (3,000,000). Every chat message AND every claude-code:deep_research
# call deducts from this same wallet. When a user hits zero, LibreChat
# blocks them with "out of credits" — Tyler tops up via the `top_up` MCP
# tool after a Venmo arrives.
#
# Tyler should also re-run with autoRefillEnabled: true and a monthly
# refillAmount once usage patterns settle (Phase 4.6).
balance:
  enabled: true
  startBalance: 3000000   # $3.00 starting credit
  autoRefillEnabled: false

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      - "claude-opus-4-7"
      - "claude-sonnet-4-6"
      - "claude-haiku-4-5-20251001"
    titleModel: "claude-haiku-4-5-20251001"
    titleConvo: true
    modelDisplayLabel: "Claude"

  openAI:
    apiKey: "${OPENAI_API_KEY}"
    models:
      - "gpt-5.5"
      - "gpt-5"
      - "gpt-4.1"
      - "gpt-4.1-mini"
      - "o4-mini"
    titleModel: "gpt-4.1-mini"
    titleConvo: true
    modelDisplayLabel: "OpenAI"

  google:
    apiKey: "${GOOGLE_KEY}"
    models:
      - "gemini-2.5-pro"
      - "gemini-2.5-flash"
      - "gemini-2.0-flash"
    titleModel: "gemini-2.5-flash"
    titleConvo: true
    modelDisplayLabel: "Gemini"

# Model presets — Claude Sonnet is the default because prioritize: true picks
# the first one with default: true on new conversations. Research preset uses
# the same model but with a system prompt that forces web-search-then-cite
# (Perplexity-style). User must enable the "searxng" MCP from the chat
# dropdown for the model to actually call out to SearXNG; the prompt tells
# it to do that.
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "claude-sonnet"
      label: "Claude Sonnet 4.6 (default)"
      default: true
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-6"
        modelLabel: "Claude Sonnet"

    - name: "research"
      label: "🔎 Research (human-verified + cite)"
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-6"
        modelLabel: "Research"
        promptPrefix: |
          You are a research assistant for the Brown family. For ANY factual
          claim, current event, statistic, or "what's happening with X" type
          question, you MUST call the `searxng` MCP tool to search the web
          BEFORE answering. Never answer from your own knowledge alone.

          If the user hasn't enabled the `searxng` MCP server in their chat,
          your first message must be exactly:
            "Please enable the **searxng** MCP from the dropdown below your
            text input, then re-send your question. (I need it for live
            web search.)"

          === SOURCE PRIORITY (HARD RULES) ===

          Tyler's rule: prioritize REAL HUMAN content. Skip AI-generated slop.

          TIER 1 (use these first, search for them explicitly):
            1. Reddit threads (search with `site:reddit.com` modifier when relevant)
            2. GitHub repos / issues / discussions / commits / READMEs
            3. Hacker News threads (`site:news.ycombinator.com`)
            4. Stack Overflow / Stack Exchange answers
            5. Personal blogs by named authors with bios + post histories
            6. Official documentation from the actual maintainers/companies
            7. Government / academic / .edu / .gov primary sources
            8. Wikipedia (only as a launchpad to its cited primary sources)

          TIER 2 (use only if Tier 1 has nothing):
            - Major newspapers with bylined human journalists (NYT, WaPo,
              Guardian, Reuters, AP) — name the journalist in your citation
            - YouTube videos by individual humans (not faceless channels)
            - Substack / Mastodon / personal X threads by domain experts

          NEVER USE (filter out, don't cite):
            - "Top 10" listicle sites (digitaltrends, hackernoon-spam,
              makeuseof, beginnersinai, toolhalla, etc. — anything that smells
              like an SEO content farm)
            - Sites with NO bylines or generic "Editorial Team" attribution
            - Articles with these AI-slop tells: em-dashes used as commas,
              "delve into", "tapestry of", "in today's fast-paced world",
              "let's explore", "in this article we will", "comprehensive guide",
              numbered-heading-then-paragraph structure without examples
            - LinkedIn "thought leadership" articles
            - openalternative.co, sourceforge software listings, generic
              "alternatives to X" aggregators

          === VERIFICATION STEP ===

          For each source you cite, briefly note WHY it's human-verified:
            - "Reddit comment by u/[username] with [N] upvotes"
            - "GitHub issue #[N] by maintainer @[username]"
            - "Blog post by [author name] (their bio: [one line])"
            - "NYT article by [journalist name]"

          If you can't find at least one Tier-1 source for the claim, say:
            "I could only find low-confidence sources for this — most results
            were AI-generated content farms. Take this with skepticism: [your
            best partial answer based on what little human content existed]."

          === OUTPUT FORMAT ===

          [Your answer text with claims numbered like [1] and [2].]

          ## Sources

          [1] Reddit r/[subreddit] — "[thread title]" by u/[username] ([N] upvotes, [date]) — [url]
          [2] GitHub [owner/repo] issue #[N] — "[issue title]" by @[maintainer] — [url]
          [3] [Author name]'s blog — "[post title]" ([date]) — [url]

          Rules:
          - Cite minimum 2 sources for any non-trivial claim. 3+ preferred.
          - At least 1 source per answer MUST be Tier-1 (Reddit/GitHub/HN/SO).
          - If sources disagree, quote each side and explain the disagreement.
          - Prefer 2024-2026 sources unless the question is about history.
          - If you can't find good human sources after 2 search attempts with
            different queries, stop and tell the user — don't fabricate.

    - name: "claude-opus"
      label: "Claude Opus 4.7 (heavy reasoning)"
      preset:
        endpoint: "anthropic"
        model: "claude-opus-4-7"
        modelLabel: "Claude Opus"

    - name: "claude-haiku"
      label: "Claude Haiku 4.5 (fast/cheap)"
      preset:
        endpoint: "anthropic"
        model: "claude-haiku-4-5-20251001"
        modelLabel: "Claude Haiku"

    - name: "gpt-5"
      label: "GPT-5"
      preset:
        endpoint: "openAI"
        model: "gpt-5"
        modelLabel: "GPT-5"

    - name: "gemini-pro"
      label: "Gemini 2.5 Pro"
      preset:
        endpoint: "google"
        model: "gemini-2.5-pro"
        modelLabel: "Gemini 2.5 Pro"

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  tts:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# MCP servers — same pattern as our local install.
# Railway notes:
#   - filesystem: rooted at /tmp/workspace inside the container (ephemeral until
#     we add a Railway volume; survives chat sessions but is lost on redeploy).
#   - railway: no env token — uses configure_api_token tool from chat on first
#     use (workaround for the GraphQL-during-init bug in @jasontanswe/railway-mcp).
#   - mcp-searxng: requires SearXNG service in the same Railway project. Will be
#     added in Phase 2; ${SEARXNG_URL} env var set on the LibreChat service to
#     the SearXNG service's private domain.
mcpServers:
  filesystem:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /tmp
    # /tmp is ephemeral but ALWAYS works. Tried adding a /workspace volume
    # for persistence (id 6d2e3b13) but mounting a SECOND volume on the
    # LibreChat svc caused immediate container crash on boot with zero
    # logs — the running 06:37 deploy had only /data mounted; adding
    # /workspace broke startup. Detached the volume. Revisit persistence
    # via Mongo GridFS or S3 in Phase 5.1.
    timeout: 60000
    chatMenu: true

  github:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
    timeout: 60000
    chatMenu: true

  supabase:
    type: stdio
    command: npx
    args:
      - -y
      - "@supabase/mcp-server-supabase@latest"
      - "--read-only"
    env:
      SUPABASE_ACCESS_TOKEN: "${SUPABASE_ACCESS_TOKEN}"
    timeout: 60000
    chatMenu: true

  railway:
    type: stdio
    command: npx
    args:
      - -y
      - "@jasontanswe/railway-mcp"
    # NO env: RAILWAY_API_TOKEN here — skipping it makes the package
    # respond to MCP init in ~3s instead of timing out on Railway GraphQL
    # handshake. Set the token at runtime via `configure_api_token` tool
    # from chat. (Per LibreChat discussion #6629: initTimeout not honored.)
    timeout: 60000
    chatMenu: true

  searxng:
    type: stdio
    command: npx
    args:
      - -y
      - "mcp-searxng"
    env:
      # SearXNG reachable via Railway internal network (same project).
      # Set SEARXNG_URL env on the LibreChat service to:
      # http://searxng.railway.internal:8080
      SEARXNG_URL: "${SEARXNG_URL}"
    timeout: 60000
    chatMenu: true

  # Phase 3.6: Comet-style agentic browser with HUMAN-IN-THE-LOOP live view.
  # Playwright MCP connects to a Browserless service over Railway's internal
  # network via CDP. Browserless ships a /debugger live-view UI — open
  # https://browserless-production-6ed9.up.railway.app/?token=<BROWSERLESS_TOKEN>
  # in a separate browser tab to WATCH the AI drive Chromium in real time and
  # take over with your mouse/keyboard at any point.
  #
  # Tradeoff vs Phase 3.5: persistent /data/chromium-profile is dropped for
  # now; Browserless sessions are ephemeral per its defaults. Add KEEP_ALIVE
  # + Browserless volume in Phase 3.7 to restore persistence with HIL.
  playwright:
    type: stdio
    # sh wrapper because LibreChat's ${} substitution only applies inside the
    # env: block, NOT inside args[]. The cdp-endpoint URL needs the token
    # inlined, which we do at runtime via $BROWSERLESS_TOKEN shell expansion.
    command: sh
    args:
      - -c
      - 'exec npx -y @playwright/mcp --browser=chromium --cdp-endpoint="ws://browserless.railway.internal:3000?token=$BROWSERLESS_TOKEN"'
    env:
      BROWSERLESS_TOKEN: "${BROWSERLESS_TOKEN}"
    initTimeout: 300000
    timeout: 180000
    chatMenu: true

  # Phase 4: Cross-user shared memory for the Brown family.
  # Default LibreChat memory is JWT-scoped — one user's chats can't see
  # another's. This MCP punches a documented hole in that isolation for
  # ONE shared knowledge layer: any family member can `remember` a fact,
  # any other can `recall` it. Every fact is permanently attributed to its
  # author via LibreChat's {{LIBRECHAT_USER_*}} env-var substitution, which
  # the platform applies per-connection BEFORE spawning the stdio child
  # (one process per (user, server) pair, so env is stable for the run).
  #
  # Source: https://github.com/NOVA-LC/family-memory-mcp
  # Tools: remember, recall, list_recent, forget, who_said
  # Storage: Mongo collection `family_facts` in LibreChat's existing `test`
  # db. Reuses ${MONGO_URI} — same hostname (mongodb.railway.internal) and
  # same auth credentials LibreChat itself uses. The MCP defensively strips
  # Railway's literal-quoted-password template wart.
  # Permissions: regular users can only `forget` their own facts; the ADMIN
  # role (Tyler) can forget anyone's.
  family-memory:
    type: stdio
    # IMPORTANT setup notes for anyone hacking on this entry:
    #
    #   1. LibreChat blocks substitution of `${MONGO_URI}` via a hardcoded
    #      SENSITIVE_ENV_VARS list (packages/data-provider/src/utils.ts).
    #      We side-step by referencing `${MONGODB_URI}` — a separate Railway
    #      service var set to `${{ MongoDB.MONGO_PRIVATE_URL }}` (Railway
    #      cross-service ref), which resolves to the same Mongo URI at
    #      container start. MONGODB_URI is NOT on LibreChat's blocklist.
    #
    #   2. Alpine LibreChat container has no `git` binary, so we use a
    #      tarball URL (https://github.com/.../archive/.../main.tar.gz)
    #      instead of npm's `github:owner/repo` shorthand (which uses git).
    #
    #   3. Container runs non-root with HOME=/, so npm's default cache path
    #      /.npm is EACCES. Point cache at /tmp/.npm.
    command: npx
    args:
      - -y
      - "https://github.com/NOVA-LC/family-memory-mcp/archive/refs/heads/main.tar.gz"
    env:
      NPM_CONFIG_CACHE: "/tmp/.npm"
      MONGODB_URI: "${MONGODB_URI}"
      FAMILY_MEMORY_DB: "test"
      FAMILY_MEMORY_COLLECTION: "family_facts"
      LIBRECHAT_USER_ID: "{{LIBRECHAT_USER_ID}}"
      LIBRECHAT_USER_EMAIL: "{{LIBRECHAT_USER_EMAIL}}"
      LIBRECHAT_USER_USERNAME: "{{LIBRECHAT_USER_USERNAME}}"
      LIBRECHAT_USER_ROLE: "{{LIBRECHAT_USER_ROLE}}"
    # First call cold-installs from GitHub (~10-15s). Subsequent
    # connections in the same container reuse npm's cache at /tmp/.npm.
    initTimeout: 60000
    timeout: 60000
    chatMenu: true

  # Phase 4.5: Claude Code as a deep-research tool.
  # Spawns the real @anthropic-ai/claude-code CLI headless with the
  # verified-human-sources doctrine baked in, inherits the family's SearXNG
  # + Playwright (Browserless CDP) stack via auto-generated .mcp.json, and
  # CHARGES the calling user against their LibreChat balance with a 1.2×
  # markup. Tyler tops up via the `top_up` tool after a family Venmo.
  #
  # Three tools exposed: deep_research (everyone), my_balance (everyone),
  # top_up (ADMIN only — Tyler).
  #
  # Source: https://github.com/NOVA-LC/claude-code-mcp
  # See also: top of file `balance:` block below — enables LibreChat's
  # built-in per-user wallet that this MCP debits.
  claude-code:
    type: stdio
    # See family-memory entry above for the three Alpine-container gotchas:
    # MONGODB_URI not MONGO_URI (sensitive-var blocklist), tarball URL not
    # github: (no git), NPM_CONFIG_CACHE=/tmp (HOME=/ unwritable).
    command: npx
    args:
      - -y
      - "https://github.com/NOVA-LC/claude-code-mcp/archive/refs/heads/main.tar.gz"
    env:
      NPM_CONFIG_CACHE: "/tmp/.npm"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      MONGODB_URI: "${MONGODB_URI}"
      BILLING_DB: "test"
      BILLING_ENABLED: "true"
      BILLING_MARKUP: "1.2"
      BILLING_MIN_USD: "0.10"
      MAX_BUDGET_USD: "2.00"
      RESEARCH_MODEL: "sonnet"
      SEARXNG_URL: "${SEARXNG_URL}"
      PLAYWRIGHT_CDP_ENDPOINT: "ws://browserless.railway.internal:3000?token=${BROWSERLESS_TOKEN}"
      E2B_API_KEY: "${E2B_API_KEY}"
      E2B_RATE_PER_SEC: "0.00005556"
      LIBRECHAT_USER_ID: "{{LIBRECHAT_USER_ID}}"
      LIBRECHAT_USER_EMAIL: "{{LIBRECHAT_USER_EMAIL}}"
      LIBRECHAT_USER_USERNAME: "{{LIBRECHAT_USER_USERNAME}}"
      LIBRECHAT_USER_ROLE: "{{LIBRECHAT_USER_ROLE}}"
    # First call cold-installs ~100MB of deps from GitHub (~30-60s). A
    # single deep_research call can easily run 5-15 minutes, hence
    # the long tool timeout.
    initTimeout: 120000
    timeout: 900000
    chatMenu: true

  # Phase 5 Zo-parity: shell access. Zo lets you run arbitrary shell
  # commands inside its sandbox; we approximate with g0t4/mcp-server-commands
  # which exposes a `run_command` tool that runs the LibreChat container's
  # /bin/sh with stdin/stdout/stderr capture. Pure Node, no env required,
  # Alpine-safe — verified handshake on Node 20 LibreChat-dev image.
  #
  # We tried @mako10k/mcp-shell-server first but it requires
  # MCP_SHELL_ALLOWED_COMMANDS or it exits on spawn (instant stdio close,
  # never responded to MCP initialize). mcp-server-commands has no allowlist
  # by default but Tyler can add one later if exposing to non-ADMINs.
  #
  # SECURITY: this is unrestricted shell. Use only with ADMIN users. The
  # LibreChat per-user MCP toggle in the chat menu is the gate.
  #
  # Source: https://github.com/g0t4/mcp-server-commands
  shell:
    type: stdio
    command: npx
    args:
      - -y
      - "mcp-server-commands"
    env:
      NPM_CONFIG_CACHE: "/tmp/.npm"
    initTimeout: 60000
    timeout: 600000
    chatMenu: true

  # scheduled-tasks DEFERRED (see Phase 5.1):
  #   - jolks/mcp-cron is a Go binary built against glibc; Railway runs
  #     Alpine (musl) and the binary segfaulted silently → 60s timeout.
  #   - liao1fan/schedule-task-mcp uses node:sqlite which needs Node 22.5+;
  #     LibreChat-dev ships Node 20.
  # Next step: build a tiny ~80-line custom MCP using @modelcontextprotocol/sdk
  # + node-cron + the existing Mongo wallet collection. Track at
  # NOVA-LC/family-cron-mcp (Phase 5.1).

  # Phase 5 Zo-parity: Dropbox via Dropbox's official remote MCP. Hosted
  # at mcp.dropbox.com — first chat call returns an OAuth URL, family
  # member grants Dropbox scope, token is stored on Dropbox's side
  # (per-user, server-side, we don't hold secrets).
  #
  # streamable-http is the documented LibreChat MCP type per
  # https://www.librechat.ai/docs/configuration/librechat_yaml/object_structure/mcp_servers
  # First attempt was rolled back as part of the /workspace volume crash;
  # re-introducing in isolation to verify on the current image tag.
  #
  # Source: https://mcp.dropbox.com/ (official, Sept 2026)
  dropbox:
    type: streamable-http
    url: "https://mcp.dropbox.com/mcp"
    timeout: 60000
    chatMenu: true

  # gdrive DEFERRED: @modelcontextprotocol/server-gdrive is deprecated by
  # Anthropic AND needs an OAuth Desktop credential set up offline before
  # it can init. Reintroduce when GDRIVE_OAUTH_B64 + GDRIVE_CREDS_B64 are
  # ready, or migrate to a community-maintained fork.
